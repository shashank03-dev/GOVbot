[variables]
# Tells Playwright to store the browser in the project directory, bypassing the temporary cache
PLAYWRIGHT_BROWSERS_PATH = "/app/pw-browsers"

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium",
    "playwright install-deps chromium"
]

[start]
cmd = "uvicorn gov_agent.main:app --host 0.0.0.0 --port $PORT"